{% extends "base.html" %}

{% block content %}

<div class="upload-header">
  <form method="post" action="/upload/stop/" style="display:inline">
    <button type="submit" class="btn btn-red">Stop Upload</button>
  </form>
  <a href="/" class="btn btn-secondary" style="margin-left:0.5rem">← Items</a>
</div>

<div class="upload-layout">

  <!-- Status table -->
  <div class="detail-section" style="overflow:hidden;display:flex;flex-direction:column">
    <h3>Progress</h3>
    <div style="overflow-y:auto;flex:1">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th style="width:130px">SKU</th>
            <th style="width:100px">Status</th>
          </tr>
        </thead>
        <tbody id="status-table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Error console -->
  <div class="detail-section" style="display:flex;flex-direction:column">
    <h3>Log</h3>
    <div class="error-console" id="error-console"></div>
  </div>

</div>

{% endblock %}


{% block scripts %}
<script>
  const tbody = document.getElementById('status-table-body');
  const console_ = document.getElementById('error-console');

  const source = new EventSource('/upload/stream/');

  source.onmessage = function(e) {
    const data = JSON.parse(e.data);

    if (data.type === 'init') {
      const tr = document.createElement('tr');
      tr.id = 'item-row-' + data.item_num;
      tr.innerHTML =
        '<td class="item-title">' + escHtml(data.title) + '</td>' +
        '<td class="mono">' + escHtml(data.sku) + '</td>' +
        '<td id="status-' + data.item_num + '" class="status status-waiting">Waiting</td>';
      tbody.appendChild(tr);

    } else if (data.type === 'status') {
      const cell = document.getElementById('status-' + data.item_num);
      if (cell) {
        cell.textContent = data.status;
        cell.className = 'status status-' + data.status.toLowerCase();
      }

    } else if (data.type === 'log') {
      appendLog(' >>  ' + data.sku + ' --- ' + data.message, false);

    } else if (data.type === 'error') {
      appendLog(' >> ERROR: ' + data.message, true);
    }
    // heartbeat: ignore
  };

  source.onerror = function() {
    appendLog(' >> Connection lost', true);
  };

  function appendLog(msg, isError) {
    const div = document.createElement('div');
    div.className = 'log-entry' + (isError ? ' error-msg' : '');
    div.textContent = msg;
    console_.appendChild(div);
    console_.scrollTop = console_.scrollHeight;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
{% endblock %}
